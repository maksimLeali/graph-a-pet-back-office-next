query listShelters($search: CommonSearch!) {
	listShelters(commonSearch: $search) {
		success
		error {
			code
			message
		}
		pagination {
			total_items
			total_pages
			current_page
			page_size
		}
		items {
			id
			name
			city
			province_code
			type
			verification_status
			created_at
		}
	}
}

query getShelter($id: ID!) {
	getShelter(id: $id) {
		success
		error {
			code
			message
		}
		shelter {
			id
			name
			street
			street_number
			city
			province_code
			postal_code
			region
			district
			type
			verification_status
			visibility
			accepts_volunteers
			public_description
			public_story_html
			public_contact_email
			public_contact_phone
			created_at
		}
	}
}

query listShelterPeople($shelter_id: ID!, $search: CommonSearch) {
	listShelterPeople(shelter_id: $shelter_id, search: $search) {
		success
		error {
			code
			message
		}
		pagination {
			total_items
			total_pages
			current_page
			page_size
		}
		items {
			id
			created_at
			first_name
			last_name
			email
			phone
			status
			source
			notes
			user {
				id
				first_name
				last_name
				email
			}
		}
	}
}

