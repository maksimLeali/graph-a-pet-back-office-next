mutation updateShelterDonationSettings($shelter_id: ID!, $data: ShelterDonationSettingsInput!) {
	updateShelterDonationSettings(shelter_id: $shelter_id, data: $data) {
		success
		error {
			code
			message
		}
		settings {
			donations_enabled
			default_pet_monthly_limit_cents
			environment
		}
	}
}
