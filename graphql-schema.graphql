# ShelterTask
############################

enum ShelterTaskType { CLEANING DEEP_CLEANING FEEDING MEDICATION GROOMING OTHER }
enum TaskStatus { PENDING IN_PROGRESS COMPLETED SKIPPED CANCELLED OVERDUE }
enum RecurrenceFreq { DAILY WEEKLY MONTHLY }
enum Weekday { MON TUE WED THU FRI SAT SUN }

# config ricorrenza (es: ogni settimana il sabato; ogni mese il primo mercoledì)
type Recurrence {
    freq: RecurrenceFreq!
    interval: Int!            # ogni N (giorni/settimane/mesi)
    weekdays: [Weekday!]      # WEEKLY: giorni; MONTHLY: giorno-settimana target
    week_ordinal: Int         # MONTHLY: 1..5 = primo..quinto, -1 = ultimo
    time_of_day: String       # "HH:MM"
    start_at: String          # data inizio (ISO)
}

input RecurrenceInput {
    freq: RecurrenceFreq!
    interval: Int = 1
    weekdays: [Weekday!]
    week_ordinal: Int
    time_of_day: String
    start_at: String
}

type ShelterTask {
    id: ID!
    created_at: String!
    shelter: Shelter!
    shelter_pet: ShelterPet
    task_type: ShelterTaskType!
    area: String
    status: TaskStatus!
    assignees: [User!]!
    assignee_shelter_people: [ShelterPerson!]!
    scheduled_at: String
    scheduled_date: String
    completed_at: String
