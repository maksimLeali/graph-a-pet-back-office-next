############################
# Scalars & Directives
############################
scalar JSON
scalar Upload

directive @subset(of: String!, values: [String!]!) on ENUM


############################
# Schema root
############################
schema {
    query: Query
    mutation: Mutation
}

type Query {
    # User
    listUsers(commonSearch: CommonSearch = {}): PaginatedUsers!
    getUser(id: ID!): UserResult!
    me: UserResult!
    getUserDashboard: UserDashboardResult!

    # Pet
    listPets(commonSearch: CommonSearch = {}): PaginatedPets!
    listMyPets(commonSearch: CommonSearch = {}): PaginatedPets!
    getPet(id: ID!): PetResult!

    # Ownership
    getOwnership(id: ID!): OwnershipResult!
    listOwnerships(commonSearch: CommonSearch = {}): PaginatedOwnerships!

    # HealthCard
    listHealthCards(commonSearch: CommonSearch = {}): PaginatedHealthCards!
    getHealthCard(id: ID!): HealthCardResult

    # Treatment
    getTreatment(id: ID!): TreatmentResult
    listTreatments(commonSearch: CommonSearch = {}): PaginatedTreatments!
    listMyTreatments(commonSearch: CommonSearch = {}): PaginatedTreatments!

    # Walk
    listWalks(commonSearch: CommonSearch = {}): PaginatedWalks!
    getWalk(id: ID!): Walk!

    # WalkRating
    listWalkRatings(commonSearch: CommonSearch = {}): PaginatedWalkRatings!
    getWalkRating(id: ID!): WalkRatingResult!

    # Cure
    listCures(commonSearch: CommonSearch = {}): PaginatedCures!
    getCure(id: ID!): Cure!

    # Report
    getReport(id: ID!): ReportResult
    listReports(commonSearch: CommonSearch = {}): PaginatedReports!

    # Media
    getMedia(id: ID!): MediaResult!
    listMedias(commonSearch: CommonSearch = {}): PaginatedMedias!

    # Code
    getCode(id: ID!): CodeResult!
    listCodes(commonSearch: CommonSearch = {}): PaginatedCodes!
    getOrCreateCode(
        ref_id: String!
        ref_table: String!
        code: String
    ): CodeResult

    # Statistics
    getDashboard: DashboardResult!
    getRealTimeStatistic: RealTimeStatisticResult!
    getGroupedStatistics(
        date_from: String!
        date_to: String
        group: String
    ): StatisticsResult!

    # DamnatioMemoriae
    getDamnatioMemoriae(id: ID!): DamnatioMemoriaeResult
    listDamnationesMemoriae(
        commonSearch: CommonSearch = {}
    ): PaginatedDamnationesMemoriae

    # Shelter
    getShelter(id: ID!): ShelterResult!
    listShelters(commonSearch: CommonSearch = {}): PaginatedShelters!
    discoverShelters(search: PublicShelterSearchInput): PaginatedPublicShelters!
    getPublicShelter(id: ID!): PublicShelter

    # ShelterRole
    getShelterRole(id: ID!): ShelterRoleResult!
    listShelterRoles(commonSearch: CommonSearch = {}): PaginatedShelterRoles!

    # Authorization (RBAC)
    myShelterAuthorization(shelter_id: ID!): ShelterAuthorizationResult!
    listRbacRoles: RbacRolesResult!
    getUserRbacRoles(user_id: ID!): UserRbacResult!
    listPermissionCatalog: [RbacPermission!]!
    getShelterInvite(id: ID!): ShelterInviteResult!
    listShelterPeople(shelter_id: ID!, search: CommonSearch = {}): PaginatedShelterPeople!
    getShelterPerson(id: ID!): ShelterPerson
    listMyOwnershipTransfers(search: CommonSearch = {}): PaginatedShelterOwnershipTransfers!
    listShelterOwnershipTransfers(shelter_id: ID!, search: CommonSearch = {}): PaginatedShelterOwnershipTransfers!
    listMyShelterClaimRequests(search: CommonSearch = {}): PaginatedShelterClaimRequests!
    getMyShelterJoinRequest(shelter_id: ID!): ShelterJoinRequestResult!
    listShelterJoinRequests(shelter_id: ID!, status: ShelterJoinRequestStatus): ShelterJoinRequestListResult!
    listShelterClaimRequests(shelter_id: ID!, search: CommonSearch = {}): PaginatedShelterClaimRequests!

    # ShelterPet
    getShelterPet(id: ID!): ShelterPetResult!
    listShelterPets(commonSearch: CommonSearch = {}): PaginatedShelterPets!

    # ShelterTask
    getShelterTask(id: ID!): ShelterTaskResult!
    listShelterTasks(commonSearch: CommonSearch = {}): PaginatedShelterTasks!
    listOperationalShelterTasks(shelter_id: ID!): PaginatedShelterTasks!

    # ShelterWalk
    getShelterWalk(id: ID!): ShelterWalkResult!
    listShelterWalks(commonSearch: CommonSearch = {}): PaginatedShelterWalks!
    listOperationalShelterWalks(shelter_id: ID!): PaginatedShelterWalks!
    listPetsNeedingWalk(shelter_id: ID!, hours: Int = 24): PaginatedShelterPets!

    # WalkingStats (chart.js-ready walk rating trend)
    getPetWalkingStats(pet_id: ID!, period: StatsPeriod!): WalkRatingChartResult!
    getShelterPetWalkingStats(shelter_pet_id: ID!, period: StatsPeriod!): WalkRatingChartResult!

    # PetWeight (shared by personal + shelter pets, both are `pets` rows)
    getLatestPetWeight(pet_id: ID!): PetWeightResult!
    getPetWeightStats(pet_id: ID!, period: StatsPeriod!): PetWeightChartResult!

    # ShelterMap / Box / Occupancy
    getShelterMap(id: ID!): ShelterMapResult!
    listShelterMaps(commonSearch: CommonSearch = {}): PaginatedShelterMaps!
    getShelterBox(id: ID!): ShelterBoxResult!
    listShelterBoxes(commonSearch: CommonSearch = {}): PaginatedShelterBoxes!
    listShelterBoxOccupancies(commonSearch: CommonSearch = {}): PaginatedBoxOccupancies!
    getCurrentBoxForPet(shelter_pet_id: ID!): ShelterBoxResult!

    # ShelterArea
    getShelterArea(id: ID!): ShelterAreaResult!
    listShelterAreas(commonSearch: CommonSearch = {}): PaginatedShelterAreas!

    # ShelterZone
    getShelterZone(id: ID!): ShelterZoneResult!
    listShelterZones(commonSearch: CommonSearch = {}): PaginatedShelterZones!

    # ShelterMapElement
    getShelterMapElement(id: ID!): ShelterMapElementResult!
    listShelterMapElements(commonSearch: CommonSearch = {}): PaginatedMapElements!

    # ShelterInventory
    getShelterInventoryItem(id: ID!): ShelterInventoryItemResult!
    listShelterInventoryItems(commonSearch: CommonSearch = {}): PaginatedInventoryItems!
    listShelterInventoryMovements(commonSearch: CommonSearch = {}): PaginatedInventoryMovements!
    listLowStockItems(shelter_id: ID!): PaginatedInventoryItems!

    # Shelter dashboard operativa
    getShelterOperationalDashboard(shelter_id: ID!): ShelterOperationalDashboardResult!
    listShelterKpiHistory(shelter_id: ID!, days: Int = 30): ShelterKpiHistoryResult!
    getMyShelterDashboard(date_from: String!, date_to: String!): MyShelterDashboardResult!

    # Notifications
    listMyNotifications(search: CommonSearch = {}): PaginatedNotifications!
    getUnreadNotificationCount: Int!

    # Donations — public (no authentication required).
    # NOTE: the task asked for a query named `getPublicShelter`, but that
    # name already exists (shelter discovery, api/shelters/queries.py) with
    # a different, @auth_middleware-gated resolver. Renaming/repointing it
    # would be an unrelated behavior change to an existing query, so this
    # domain exposes its own name instead — see the Donations report for
    # this deliberate deviation.
    discoverPublicShelters(search: PublicShelterSearchInput): PaginatedPublicShelters!
    getPublicDonationShelter(shelter_id: ID!): PublicShelter
    listPublicShelterPets(shelter_id: ID!): PublicShelterPetsResult!
    getPublicShelterPet(shelter_id: ID!, pet_id: ID!): PublicShelterPetResult!
    getPublicPetFundingNeeds(pet_id: ID!): PetFundingNeedsResult!
    getPublicDonationAvailability(shelter_id: ID!, pet_id: ID, funding_need_id: ID): DonationAvailabilityResult!

    # Donations — donor (authenticated)
    listMyDonations(commonSearch: CommonSearch = {}): PaginatedDonations!
    # polled client-side (app pending-confirmation screen) every ~20s while a
    # donation is PENDING/PROCESSING — scoped to the caller's own donation,
    # 404s (via NotFoundError) if the id doesn't belong to them
    getMyDonationStatus(donation_id: ID!): DonationResult!
    listMySavedPaymentMethods: UserPaymentMethodsResult!

    # Donations — shelter operations
    getShelterDonationOverview(shelter_id: ID!): ShelterDonationOverviewResult!
    listShelterDonations(shelter_id: ID!, commonSearch: CommonSearch = {}): PaginatedDonations!
    listFundingNeeds(shelter_id: ID!, status: FundingNeedStatus): PetFundingNeedsResult!
    listPetDonationPolicies(shelter_id: ID!): PetDonationPoliciesResult!
    getPetDonationLimitHistory(pet_id: ID!): DonationLimitReservationsResult!
    listShelterExpenses(shelter_id: ID!, status: ExpenseStatus): ShelterExpensesResult!
    getShelterDonationSettings(shelter_id: ID!): ShelterDonationSettingsResult!
    getShelterMonthlyDonationReport(shelter_id: ID!, year: Int!, month: Int!): ShelterMonthlyReportResult!

    # Donations — platform operations
    listPlatformDonations(commonSearch: CommonSearch = {}, shelter_id: ID, status: DonationStatus, donor_type: DonorType): PaginatedDonations!
    listDisputes(commonSearch: CommonSearch = {}): PaginatedDonations!
    listConnectedAccounts(environment: ConnectedAccountEnvironment): PaginatedStripeConnectedAccounts!
    listFinancialMovements(commonSearch: CommonSearch = {}, shelter_id: ID, movement_type: FinancialMovementType): PaginatedFinancialMovements!
    listStripeWebhookEvents(commonSearch: CommonSearch = {}, status: WebhookEventStatus, event_type: String): PaginatedStripeWebhookEvents!
}

type Mutation {
    # User
    createUser(data: UserCreate!): UserResult!
    signUp(data: UserCreate!): UserResult!
    updateUser(id: ID!, data: UserUpdate!): UserResult!
    deleteUser(id: ID!): DeleteResult!
    updateMe(data: UserUpdate!): UserResult!
    login(email: String!, password: String!): NewTokenResult!
    logout: Boolean!
    refreshToken: NewTokenResult!
    verifyUser(email: String!, code: String): NewTokenResult!
    resendCode(email: String!): GenericResult!

    # Pet
    createPet(data: PetCreate!): PetResult!
    updatePet(id: ID!, data: PetUpdate!): PetResult!
    deletePet(id: ID!): DeleteResult!
    addPet(pet: PetCreate!): PetResult!
    addPetToUser(pet: PetCreate!, userId: String!, custodyLevel: CustodyLevel): PetAddedResult!
    addPetToMe(pet: PetCreate!, custodyLevel: CustodyLevel): PetAddedResult!

    # Ownership
    deleteOwnership(id: ID!): DeleteResult!
    updateOwnership(id: ID!, data: OwnershipUpdate!): OwnershipResult!
    linkPetToUser(
        userId: ID!
        petId: ID!
        custodyLevel: CustodyLevel
    ): OwnershipResult!
    linkPetToMe(petId: ID!, custodyLevel: CustodyLevel): OwnershipResult!
    invitePetOwnership(petId: ID!, userId: ID!, custodyLevel: CustodyLevel!): OwnershipResult!
    acceptPetOwnershipInvite(id: ID!): OwnershipResult!
    rejectPetOwnershipInvite(id: ID!): OwnershipResult!

    # HealthCard
    createHealthCard(data: HealthCardCreate!): HealthCardResult!
    updateHealthCard(id: ID!, data: HealthCardUpdate!): HealthCardResult!

    # Treatment
    createTreatment(data: TreatmentCreate!): TreatmentResult!
    updateTreatment(id: ID!, data: TreatmentUpdate!): TreatmentResult!
    deleteTreatment(id: ID!): DeleteResult!

    # Walk
    createWalk(data: WalkCreate!): WalkResult!
    updateWalk(id: ID!, data: WalkUpdate!): WalkResult!
    deleteWalk(id: ID!): DeleteResult!

    # WalkRating
    createWalkRating(data: WalkRatingCreate!): WalkRatingResult!
    updateWalkRating(id: ID!, data: WalkRatingUpdate!): WalkRatingResult!
    deleteWalkRating(id: ID!): DeleteResult!

    # Cure
    createCure(data: CureCreate!): CureResult!
    updateCure(id: ID!, data: CureUpdate!): CureResult!
    deleteCure(id: ID!): DeleteResult!

    # Report
    createReport(data: ReportCreate!): ReportResult!
    updateReport(id: ID!, data: ReportUpdate!): ReportResult!
    respondToReport(id: ID!, reporter: ReporterCreate!): ReportResult!

    # Media
    updateMedia(id: ID!, data: MediaUpdate!): MediaResult!
    createMedia(data: MediaCreate!): MediaResult!

    # Code
    createCode(data: CodeCreate!): CodeResult!
    checkCode(code: String!): CodeValidationResult!

    # DamnatioMemoriae
    restoreMemoriae(id: ID!): RestoredResult!

    # Shelter
    createShelter(data: ShelterCreate!): ShelterResult!
    createPersonalWorkspace(data: CreatePersonalWorkspaceInput!): ShelterResult!
    updateShelter(id: ID!, data: ShelterUpdate!): ShelterResult!
    deleteShelter(id: ID!): DeleteResult!

    # ShelterRole
    createShelterRole(data: ShelterRoleCreate!): ShelterRoleResult!
    updateShelterRole(id: ID!, data: ShelterRoleUpdate!): ShelterRoleResult!
    deleteShelterRole(id: ID!): DeleteResult!
    createShelterInvite(data: ShelterInviteCreate!): ShelterInviteResult!
    acceptShelterInvite(id: ID!): ShelterInviteResult!
    rejectShelterInvite(id: ID!): ShelterInviteResult!
    createShelterPerson(data: CreateShelterPersonInput!): ShelterPersonResult!
    updateShelterPerson(id: ID!, data: UpdateShelterPersonInput!): ShelterPersonResult!
    archiveShelterPerson(id: ID!): ShelterPersonResult!
    linkShelterPersonToUser(person_id: ID!, user_id: ID!): ShelterPersonResult!
    requestShelterOwnershipTransfer(shelter_id: ID!, to_user_id: ID!, new_role_for_previous_owner: RoleLevel): ShelterOwnershipTransferResult!
    acceptShelterOwnershipTransfer(id: ID!): ShelterOwnershipTransferResult!
    rejectShelterOwnershipTransfer(id: ID!): ShelterOwnershipTransferResult!
    cancelShelterOwnershipTransfer(id: ID!): ShelterOwnershipTransferResult!
    requestShelterClaim(shelter_id: ID!, data: ShelterClaimInput!): ShelterClaimRequestResult!
    cancelShelterClaim(id: ID!): ShelterClaimRequestResult!
    approveShelterClaim(id: ID!, decision_note: String): ShelterClaimRequestResult!
    rejectShelterClaim(id: ID!, decision_note: String): ShelterClaimRequestResult!
    applyToShelterAsVolunteer(shelter_id: ID!, message: String): ShelterJoinRequestResult!
    approveShelterJoinRequest(id: ID!): ShelterJoinRequestResult!
    rejectShelterJoinRequest(id: ID!): ShelterJoinRequestResult!

    # ShelterPet
    createShelterPet(data: ShelterPetCreate!): ShelterPetResult!
    createShelterPets(data: ShelterPetsCreate!): ShelterPetsResult!
    createShelterPetsWithData(data: ShelterPetsWithDataCreate!): ShelterPetsResult!
    changeShelter(data: ChangeShelterInput!): ShelterPetResult!
    deleteShelterPet(id: ID!): DeleteResult!

    # ShelterTask
    createShelterTask(data: ShelterTaskCreate!): ShelterTaskResult!
    updateShelterTask(id: ID!, data: ShelterTaskUpdate!): ShelterTaskResult!
    completeShelterTask(id: ID!, notes: String): ShelterTaskResult!
    skipShelterTask(id: ID!, reason: String): ShelterTaskResult!
    deleteShelterTask(id: ID!): DeleteResult!

    # ShelterWalk
    createShelterWalk(data: ShelterWalkCreate!): ShelterWalkResult!
    updateShelterWalk(id: ID!, data: ShelterWalkUpdate!): ShelterWalkResult!
    setShelterWalkManualDuration(id: ID!, duration_minutes: Int!): ShelterWalkResult!
    startShelterWalk(id: ID!): ShelterWalkResult!
    completeShelterWalk(id: ID!, notes: String): ShelterWalkResult!
    cancelShelterWalk(id: ID!, reason: String): ShelterWalkResult!
    deleteShelterWalk(id: ID!): DeleteResult!
    createShelterWalkRating(data: ShelterWalkRatingCreate!): ShelterWalkRatingResult!
    createPetWeight(data: PetWeightCreate!): PetWeightResult!

    # ShelterMap / Box / Occupancy
    createShelterMap(data: ShelterMapCreate!): ShelterMapResult!
    updateShelterMap(id: ID!, data: ShelterMapUpdate!): ShelterMapResult!
    deleteShelterMap(id: ID!): DeleteResult!
    createShelterBox(data: ShelterBoxCreate!): ShelterBoxResult!
    updateShelterBox(id: ID!, data: ShelterBoxUpdate!): ShelterBoxResult!
    deleteShelterBox(id: ID!): DeleteResult!
    assignPetToBox(box_id: ID!, shelter_pet_id: ID!, reason: String): ShelterBoxOccupancyResult!
    releasePetFromBox(occupancy_id: ID!, reason: String): ShelterBoxOccupancyResult!
    movePetBetweenBoxes(shelter_pet_id: ID!, to_box_id: ID!, reason: String): ShelterBoxOccupancyResult!
    markBoxCleaned(box_id: ID!): ShelterBoxResult!
    setBoxOutOfService(box_id: ID!, out_of_service: Boolean!): ShelterBoxResult!

    # ShelterArea + layout batch
    createShelterArea(data: ShelterAreaCreate!): ShelterAreaResult!
    updateShelterArea(id: ID!, data: ShelterAreaUpdate!): ShelterAreaResult!
    deleteShelterArea(id: ID!): DeleteResult!

    # ShelterZone
    createShelterZone(data: ShelterZoneCreate!): ShelterZoneResult!
    updateShelterZone(id: ID!, data: ShelterZoneUpdate!): ShelterZoneResult!
    deleteShelterZone(id: ID!): DeleteResult!

    saveShelterMapLayout(map_id: ID!, data: ShelterMapLayoutInput!): ShelterMapResult!

    # ShelterMapElement
    createShelterMapElement(data: ShelterMapElementCreate!): ShelterMapElementResult!
    updateShelterMapElement(id: ID!, data: ShelterMapElementUpdate!): ShelterMapElementResult!
    deleteShelterMapElement(id: ID!): DeleteResult!

    # ShelterInventory
    createShelterInventoryItem(data: ShelterInventoryItemCreate!): ShelterInventoryItemResult!
    updateShelterInventoryItem(id: ID!, data: ShelterInventoryItemUpdate!): ShelterInventoryItemResult!
    archiveShelterInventoryItem(id: ID!): ShelterInventoryItemResult!
    deleteShelterInventoryItem(id: ID!): DeleteResult!
    createShelterInventoryMovement(data: ShelterInventoryMovementCreate!): ShelterInventoryMovementResult!

    # Notifications
    markNotificationAsRead(id: ID!): NotificationResult!
    markAllNotificationsAsRead: NotificationResult!
    dismissNotification(id: ID!): NotificationResult!

    # RBAC role management (back-office)
    createRbacRole(input: CreateRbacRoleInput!): RbacRoleMutationResult!
    updateRbacRolePermissions(input: UpdateRbacRolePermissionsInput!): RbacRoleMutationResult!
    assignRbacRoleToUser(user_id: ID!, role_id: ID!, shelter_id: ID): UserRbacAssignmentResult!
    revokeRbacRoleAssignment(assignment_id: ID!): UserRbacAssignmentResult!
    archiveRbacRole(role_id: ID!): RbacRoleMutationResult!

    # Donations — donor mutations (guest or authenticated)
    createGuestDonationCheckout(data: GuestDonationCheckoutInput!): DonationCheckoutResult!
    createAuthenticatedDonation(data: AuthenticatedDonationInput!): DonationCheckoutResult!
    createPaymentMethodSetup(data: PaymentMethodSetupInput!): PaymentMethodSetupResult!
    removeSavedPaymentMethod(id: ID!): GenericResult!
    setDefaultPaymentMethod(id: ID!): UserPaymentMethodResult!

    # Donations — shelter mutations
    startShelterStripeOnboarding(shelter_id: ID!, refresh_url: String!, return_url: String!): StripeOnboardingResult!
    refreshShelterStripeAccount(shelter_id: ID!): StripeAccountRefreshResult!
    updateShelterDonationSettings(shelter_id: ID!, data: ShelterDonationSettingsInput!): ShelterDonationSettingsResult!
    createFundingNeed(data: FundingNeedCreateInput!): PetFundingNeedResult!
    updateFundingNeed(id: ID!, data: FundingNeedUpdateInput!): PetFundingNeedResult!
    closeFundingNeed(id: ID!): PetFundingNeedResult!
    updatePetDonationLimit(data: PetDonationLimitInput!): PetDonationPolicyResult!
    createTemporaryPetLimitOverride(data: TemporaryPetLimitOverrideInput!): PetDonationPolicyResult!
    createShelterExpense(data: ShelterExpenseCreateInput!): ShelterExpenseResult!
    updateShelterExpense(id: ID!, data: ShelterExpenseUpdateInput!): ShelterExpenseResult!
    submitShelterExpense(id: ID!): ShelterExpenseResult!
    approveShelterExpense(id: ID!): ShelterExpenseResult!
    rejectShelterExpense(id: ID!, reason: String!): ShelterExpenseResult!

    # Donations — platform mutations
    refundDonation(donation_id: ID!, reason: String): DonationResult!
    partiallyRefundDonation(donation_id: ID!, amount_cents: Int!, reason: String!): DonationResult!
    suspendConnectedAccount(connected_account_id: ID!): StripeConnectedAccountResult!
    reconcileFinancialTransaction(donation_id: ID!): ReconciliationResult!
    retryStripeWebhookEvent(id: ID!): StripeWebhookEventResult!
}


############################
# Common
############################

type Error {
    code: String!
    errorCode: String
    message: String!
    extra: String
}

# Authorization (RBAC): effective permissions of the caller on one shelter.
# The frontend must consume these keys, never derive capabilities from role names.
type ShelterAuthorization {
    shelter_id: ID!
    membership_status: String
    permissions: [String!]!
}

type ShelterAuthorizationResult {
    success: Boolean!
    error: Error
    authorization: ShelterAuthorization
}

type RbacRole {
    id: ID!
    code: String!
    name: String!
    scope_type: String!
    is_system: Boolean!
    grants_all_permissions: Boolean!
    permissions: [String!]!
}

type RbacRolesResult {
    success: Boolean!
    error: Error
    roles: [RbacRole!]!
}

type UserRbacAssignment {
    id: ID!
    role_id: ID!
    role_code: String!
    role_name: String!
    scope_type: String!
    shelter_id: ID
    status: String!
    valid_from: String
    valid_until: String
    assigned_at: String!
}

type UserRbacAssignmentResult {
    success: Boolean!
    error: Error
    assignment: UserRbacAssignment
}

type UserRbacResult {
    success: Boolean!
    error: Error
    assignments: [UserRbacAssignment!]!
    effective_platform_permissions: [String!]!
}

type RbacPermission {
    key: String!
    domain: String!
    scope_type: String!
    risk_level: String!
}

type RbacRoleMutationResult {
    success: Boolean!
    error: Error
    role: RbacRole
}

input CreateRbacRoleInput {
    code: String!
    name: String!
    description: String
    scope_type: String!
    permission_keys: [String!]!
}

input UpdateRbacRolePermissionsInput {
    role_id: ID!
    permission_keys: [String!]!
}

type GenericResult {
    success: Boolean!
    error: Error
}

type DefaultResult {
    success: Boolean
    error: Error
}

type DeleteResult {
    success: Boolean
    id: ID
    error: Error
}

type Coordinates {
    latitude: Float
    longitude: Float
}

"""
how a list is owganized by how many items has been found, in which page we are, the number of element per page and how many pages there are
"""
type Pagination {
    total_items: Int
    total_pages: Int
    current_page: Int
    page_size: Int
}

type Tag {
    id: ID!
    text: String!
}

input CommonSearch {
    page: Int = 0
    page_size: Int = 20
    order_by: String = "created_at"
    order_direction: String = "desc"
    filters: DeepFilters = {
        fixed: []
        ranges: []
        lists: []
        join: []
        and: null
        or: null
        not: null
    }
}

input DeepFilters {
    and: DeepFilters
    or: DeepFilters
    not: DeepFilters
    fixed: [FixedFilter] = []
    ranges: [RangeFilter] = []
    search: SearchFilter = { value: "", fields: [] }
    lists: [ListFilter] = []
    join: [Join] = []
}

input FixedFilter {
    key: String!
    value: String!
}

input Filters {
    fixed: [FixedFilter] = []
    ranges: [RangeFilter] = []
    lists: [ListFilter] = []
    join: [Join] = []
    search: [SearchFilter]
}

input ListFilter {
    key: String
    value: [String]!
}

input RangeFilter {
    key: String!
    value: RangeFilterValue
}

input RangeFilterValue {
    min: String
    max: String
}

input SearchFilter {
    value: String = ""
    fields: [String] = []
}

"""
just see
"""
input Join {
    key: String!
    value: DeepFilters!
}


############################
# User
############################

enum UserRole {
    USER
    ADMIN
}

type User {
    id: ID!
    first_name: String!
    last_name: String!
    email: String!
    role: UserRole!
    created_at: String!
    ownerships(commonSearch: CommonSearch = {}): PaginatedOwnerships
    pets_owned: Int!
    pets_on_loan: Int!
    last_activity: String
    profile_picture: Media
    reports(commonSearch: CommonSearch = {}): PaginatedReports
}

type UserResult {
    success: Boolean!
    error: Error
    user: User
}

type UsersResult {
    success: Boolean!
    error: Error
    users: [User]!
}

type PaginatedUsers {
    success: Boolean
    error: Error
    items: [User]!
    pagination: Pagination!
}

type UserDashboard {
    user_id: String
    ownerships(commonSearch: CommonSearch = {}): PaginatedOwnerships
    reports(commonSearch: CommonSearch = {}): PaginatedReports
}

type UserDashboardResult {
    dashboard: UserDashboard
    error: Error
    success: Boolean
}

type NewTokenResult {
    success: Boolean!
    error: Error
    token: String
    user: User
}

input UserCreate {
    first_name: String!
    last_name: String!
    email: String!
    password: String!
}

